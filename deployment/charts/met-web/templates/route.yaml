{{- define "routeHost" -}}
{{- if contains "https://" .Values.app.url -}}
{{- .Values.app.url -}}
{{- else -}}
{{- printf "https://%s" .Values.app.url -}}
{{- end -}}
{{- end -}}

apiVersion: route.openshift.io/v1
kind: Route
metadata:
  labels:
    app: {{ .Values.app.name }}
  name: {{ .Chart.Name }}
  annotations:
    # Add annotation to preserve the URL format
    haproxy.router.openshift.io/rewrite-target: {{ template "routeHost" . }}
spec:
  host: {{ .Values.app.url | replace "https://" "" }}  # Strip https:// for DNS compliance
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  to:
    kind: Service
    name: {{ .Chart.Name }}
  wildcardPolicy: None
